<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <rect width="180" height="180" rx="40" fill="#0F1018"/>
  <!-- Subtle inner glow -->
  <rect width="180" height="180" rx="40" fill="url(#glow)" opacity="0.6"/>
  <!-- Prism body -->
  <path d="M40 144L90 36L140 144Z" stroke="url(#body)" stroke-width="6" stroke-linejoin="round"/>
  <!-- Three diverging rays -->
  <line x1="124" y1="80" x2="162" y2="56" stroke="#22D3EE" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <line x1="124" y1="92" x2="166" y2="92" stroke="#E879F9" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <line x1="124" y1="104" x2="162" y2="128" stroke="#4ADE80" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <!-- Incoming ray -->
  <line x1="14" y1="92" x2="50" y2="92" stroke="#F8FAFC" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <defs>
    <linearGradient id="body" x1="40" y1="36" x2="140" y2="144" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#E879F9"/>
      <stop offset="1" stop-color="#4ADE80"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop stop-color="#6366F1" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0F1018" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
