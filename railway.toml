# Root railway.toml — used for local `railway up` deployments.
# Change dockerfilePath to the target service before deploying:
#   apps/trader/Dockerfile, apps/sentinel/Dockerfile, apps/polymarket-gateway/Dockerfile
# For GitHub-connected deploys, each service's own railway.toml in
# apps/<service>/railway.toml takes precedence when rootDirectory is set.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/trader/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
