[project]
name = "prism-calibration"
version = "0.1.0"
description = "Local-first calibration corpus schemas and CLI for Prism."
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28",
    "pydantic>=2.13",
    "psycopg[binary]>=3.3",
    "structlog>=24.1",
    "prism-schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prism_calibration"]

[tool.uv.sources]
prism-schemas = { workspace = true }

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "RUF"]

[tool.mypy]
strict = true
python_version = "3.12"
